services:
  - type: web
    name: mnist-digit-recognition
    env: python
    region: singapore
    plan: free
    rootDir: digit-recognizer
    buildCommand: pip install -r requirements.txt
    startCommand: python app_final.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.8.0
    disk:
      name: model-data
      mountPath: /opt/render/project/src
      sizeGB: 1
